schema_version: geml-corpus-v1
corpus_id: geml-goal1-final-250k
generator_seed: 20260721

corpus:
  total_expressions: 250000
  split_seed: 20260721
  ood_operator_families:
    - ood_stress

splits:
  train: 175000
  validation: 25000
  test_iid: 25000
  test_ood: 25000

deduplication:
  identity_fields:
    - domain_mode
    - sympy_srepr
  backend: sqlite
  database_path: outputs/goal1/corpus/dedup.sqlite3
  duplicate_audit_path: outputs/goal1/corpus/duplicates.jsonl
  checkpoint_policy: after_atomic_shard_publication

shards:
  root: outputs/goal1/corpus
  primary_format: parquet
  debug_format: jsonl.gz
  write_debug_shards: false
  minimum_rows: 10000
  maximum_rows: 25000
  parquet_compression: zstd
  checksum_algorithm: sha256
  resume: true

manifests:
  directory: outputs/goal1/corpus/manifests
  corpus_filename: corpus.manifest.json
  retain_duplicate_statistics: true
  retain_rejection_statistics: true
  include_git_commit_when_available: true
  package_versions:
    - geml
    - pyarrow
    - pydantic
    - sympy
